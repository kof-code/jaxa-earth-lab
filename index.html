<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAXA Earth Lab</title>
    <!-- LeafletのCSSを先に読み込む -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; }
        #map { width: 100%; height: 600px; border: 2px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🛰️ JAXA Earth Lab</h1>
    <p>地図の表示をテストしています。世界地図が出たら成功です！</p>
    <div id="map"></div>

    <script>
        // 1. まずライブラリをプログラムから強制的に読み込む
        const script = document.createElement('script');
        script.src = 'https://unpkg.com';
        
        // 2. ライブラリが「完全に読み込まれた」瞬間に地図を作る
        script.onload = function() {
            console.log("Leafletの読み込み完了！地図を作ります。");
            
            // 地図の作成
            const map = L.map('map').setView([35.6812, 139.7671], 10);

            // 世界地図のレイヤーを追加
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            console.log("地図の表示に成功しました！");
        };

        // スクリプトの読み込みを開始
        document.head.appendChild(script);
    </script>
</body>
</html>
