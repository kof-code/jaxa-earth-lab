<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAXA Earth Lab</title>
    <!-- 地図ライブラリ Leaflet の読み込み -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; }
        #map { width: 100%; height: 600px; border: 2px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🛰️ JAXA Earth Lab</h1>
    <p>世界中の地図が表示されたら、次はNode.jsで衛星データを取得します！</p>
    <div id="map"></div>

    <script src="https://unpkg.com"></script>
    <script>
        // 東京周辺を表示
        const map = L.map('map').setView([35.6812, 139.7671], 10);

        // 世界地図（OpenStreetMap）を重ねる
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        console.log("普通の地図が表示されました！");
    </script>
</body>
</html>
