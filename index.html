<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAXA Earth Lab</title>
    <!-- 先にCSSとJSを読み込む -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; }
        #map { width: 100%; height: 600px; border: 2px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🛰️ JAXA Earth Lab</h1>
    <p>地図が表示されたら、次はNode.jsでJAXAのデータを連携させます！</p>
    <div id="map"></div>

    <script>
        // ページが完全に読み込まれてから実行
        window.onload = function() {
            console.log("地図の初期化を開始します...");
            
            // 東京周辺を表示
            const map = L.map('map').setView([35.6812, 139.7671], 10);

            // 世界地図を重ねる
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            console.log("地図の表示に成功しました！");
        };
    </script>
</body>
</html>
