    <script>
        async function checkData() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = 'JAXAからデータを取得中...';

            try {
                // 自分の作ったNode.js APIを叩く
                const response = await fetch('/api/hello');
                const result = await response.json();

                if (result.success || result.elevation !== undefined) {
                    statusEl.innerText = `成功！東京駅の標高は ${result.elevation}m です。`;
                    console.log(result);
                } else {
                    statusEl.innerText = 'エラー: データが空です';
                }
            } catch (e) {
                statusEl.innerText = 'エラーが発生しました';
                console.error(e);
            }
        }
    </script>
