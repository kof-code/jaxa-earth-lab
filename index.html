<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAXA Earth Lab</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        #map { width: 100%; height: 600px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .info { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="info">
        <h1>🛰️ JAXA Earth Lab</h1>
        <p>衛星データ（JAXA Earth API）をNode.js環境で活用する実験サイト</p>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com"></script>
    <!-- JAXAの地図ライブラリを読み込み -->
    <script type="module">
        import { JaxaEarth } from "https://data.earth.jaxa.jp";

        // 地図の初期化（東京周辺を中央に）
        const map = L.map('map').setView([35.6812, 139.7671], 5);

        // 背景にOpenStreetMapを表示
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // ここに将来、土地被覆データや降水量データを重ねていきます
        console.log("JAXA 地図準備完了！");
    </script>
</body>
</html>
